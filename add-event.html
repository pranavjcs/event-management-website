<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Event</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar container">
        <a class="brand" href="index.html">Campus Events</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a id="nav-register" href="register.html">Register</a>
          <a id="nav-login" href="login.html">Login</a>
          <a href="contact.html">Contact</a>
          <a class="active" id="nav-admin" href="admin-dashboard.html">Dashboard</a>
          <button id="theme-toggle" class="btn btn-outline toggle" type="button">
            Dark Mode
          </button>
          <a id="nav-logout" href="#">Logout</a>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="form-wrapper">
        <h2>Add New Event</h2>
        <form id="event-form" novalidate>
          <div>
            <label for="eventTitle">Event Title</label>
            <input id="eventTitle" type="text" placeholder="Innovation Expo" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="eventCategory">Category</label>
            <input id="eventCategory" type="text" placeholder="Technology" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="eventDate">Date</label>
            <input id="eventDate" type="date" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="eventTime">Time</label>
            <input id="eventTime" type="text" placeholder="10:30 AM" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="eventVenue">Venue</label>
            <input id="eventVenue" type="text" placeholder="Auditorium" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="eventSeats">Available Seats</label>
            <input id="eventSeats" type="number" min="1" placeholder="100" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="eventDescription">Description</label>
            <textarea id="eventDescription" placeholder="Event overview..."></textarea>
            <p class="error-text"></p>
          </div>
          <button class="btn btn-primary" type="submit">Save Event</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="container footer-grid">
        <div>
          <h3>Campus Events</h3>
          <p class="small">Professional event management for every department.</p>
        </div>
        <div>
          <h4>Quick Links</h4>
          <p class="small"><a href="events.html">Events</a></p>
          <p class="small"><a href="register.html">Student Register</a></p>
        </div>
        <div>
          <h4>Contact</h4>
          <p class="small">eventsdesk@campus.in</p>
          <p class="small">+91 44 2812 3456</p>
        </div>
      </div>
    </footer>

    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/events.js"></script>
    <script src="js/ui.js"></script>
    <script>
      window.auth.setNavState();
      window.auth.attachLogout();
      window.eventsApi.createEvent("event-form");
    </script>
  </body>
</html>
