<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar container">
        <a class="brand" href="index.html">Campus Events</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a id="nav-register" href="register.html">Register</a>
          <a class="active" id="nav-login" href="login.html">Login</a>
          <a href="contact.html">Contact</a>
          <a id="nav-admin" href="admin-login.html">Admin</a>
          <button id="theme-toggle" class="btn btn-outline toggle" type="button">
            Dark Mode
          </button>
          <a id="nav-logout" href="#">Logout</a>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="form-wrapper">
        <h2>Student Login</h2>
        <form id="student-login-form" novalidate>
          <div>
            <label for="loginEmail">Email Address</label>
            <input id="loginEmail" type="email" placeholder="jane@college.edu" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="********" />
            <p class="error-text"></p>
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(15, 23, 42, 0.1); text-align: center;">
          <p style="color: var(--muted); margin-bottom: 12px;">Don't have an account yet?</p>
          <a href="register.html" class="btn btn-outline" style="display: inline-block;">Create Account Here</a>
        </div>
      </section>
    </main>

    <footer>
      <div class="container footer-grid">
        <div>
          <h3>Campus Events</h3>
          <p class="small">Professional event management for every department.</p>
        </div>
        <div>
          <h4>Quick Links</h4>
          <p class="small"><a href="events.html">Events</a></p>
          <p class="small"><a href="register.html">Student Register</a></p>
        </div>
        <div>
          <h4>Contact</h4>
          <p class="small">eventdesk@college.edu</p>
          <p class="small">+1 (555) 210-2233</p>
        </div>
      </div>
    </footer>

    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
      window.auth.setNavState();
      window.auth.attachLogout();
      window.auth.loginStudent("student-login-form");
    </script>
  </body>
</html>
