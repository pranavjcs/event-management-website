<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar container">
        <a class="brand" href="index.html">Campus Events</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a id="nav-register" href="register.html">Register</a>
          <a id="nav-login" href="login.html">Login</a>
          <a href="contact.html">Contact</a>
          <a class="active" id="nav-admin" href="admin-login.html">Admin</a>
          <button id="theme-toggle" class="btn btn-outline toggle" type="button">
            Dark Mode
          </button>
          <a id="nav-logout" href="#">Logout</a>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="form-wrapper">
        <h2>Admin Login</h2>
        <p class="notice">Use admin@college.edu / Admin@123 for demo.</p>
        <form id="admin-login-form" novalidate>
          <div>
            <label for="adminEmail">Admin Email</label>
            <input id="adminEmail" type="email" placeholder="admin@college.edu" />
            <p class="error-text"></p>
          </div>
          <div>
            <label for="adminPassword">Password</label>
            <input id="adminPassword" type="password" placeholder="********" />
            <p class="error-text"></p>
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="container footer-grid">
        <div>
          <h3>Campus Events</h3>
          <p class="small">Professional event management for every department.</p>
        </div>
        <div>
          <h4>Quick Links</h4>
          <p class="small"><a href="events.html">Events</a></p>
          <p class="small"><a href="register.html">Student Register</a></p>
        </div>
        <div>
          <h4>Contact</h4>
          <p class="small">eventsdesk@campus.in</p>
          <p class="small">+91 44 2812 3456</p>
        </div>
      </div>
    </footer>

    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
      window.auth.setNavState();
      window.auth.attachLogout();
      window.auth.loginAdmin("admin-login-form");
    </script>
  </body>
</html>
